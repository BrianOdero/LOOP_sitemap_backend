# ── Server ───────────────────────────────────────────────────
server.port=8080

# ════════════════════════════════════════════════════════════
# DATABASE — H2 (active for local development)
#
# H2 is an in-memory database that requires zero setup.
# The database is created fresh on every startup and wiped
# on shutdown — perfect for building and testing Phase 1.
#
# To switch to PostgreSQL when ready:
#   1. Comment out this entire H2 block
#   2. Uncomment the PostgreSQL block below
#   3. Swap the H2 dependency for PostgreSQL in pom.xml
# ════════════════════════════════════════════════════════════
spring.datasource.url=jdbc:h2:mem:loop_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 browser console — access at http://localhost:8080/h2-console
# JDBC URL to enter in the console: jdbc:h2:mem:loop_db
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate (H2) ─────────────────────────────────────
# create-drop: recreates the schema on every startup — ideal
# while actively building entities (no stale column errors)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# ════════════════════════════════════════════════════════════
# DATABASE — PostgreSQL (uncomment when deploying)
#
# spring.datasource.url=jdbc:postgresql://localhost:5432/loop_db
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=admin
# spring.datasource.password=secret
#
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ════════════════════════════════════════════════════════════

# ── JWT ──────────────────────────────────────────────────────
# Minimum 32 characters for HS256.
# Use an env var in production: app.jwt.secret=${JWT_SECRET}
jwt.secret=loop-super-secret-key-minimum-32-chars-long!
jwt.expiration-ms=86400000

# ── Cookie ───────────────────────────────────────────────────
app.cookie.name=loop_token
app.cookie.max-age-seconds=86400


spring.web.error.include-stacktrace=always